<!DOCTYPE html>
<html>
<head>
  <title>interest-calculator</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      color: black;
    }  
    /* This adds a little space between the label and the input */
    label {
      margin-right: 10px;
      display: inline-block;
      min-width: 110px;
    }
    .input-group {
      margin-bottom: 15px
    }
    button, select, input {
      border-radius: 5px;
      border-style: solid;
      border-width: 1px;
      border-color: black;
      background-color: white;
      padding: 4.5px;
      color: black;
    }
  </style>
</head>
<body>

  <div class="input-group">
    <label for="deposited-input">Deposited:</label>
    <input type="text" name="Deposited" id="deposited-input">
  </div>

  <div class="input-group">
    <label for="interest-input">Interest rate:</label>
    <input type="text" name="Interest" id="interest-input"><span>%</span>
  </div>

  <div class="input-group">
    <label for="compound-input">Compound Rate:</label>
    <select name="Compound Rate" id="compound-input">
      <option value="continuous">Continuously compounded</option>
      <option value="daily">Compounded daily</option>
      <option value="monthly">Compounded monthly</option>
      <option value="yearly">Compounded yearly</option>
    </select>
  </div>

  <div class="input-group">
    <label for="time-input">Years:</label>
    <input type="text" name="Time period" id="time-input">
  </div>

  <button id="calculate">Calculate interest</button>
  
  <p><strong>Result:</strong> <span id="result-text"></span></p>
  
  <p><strong>Equation:</strong> <span id="equation-text"></span></p>

  <script>
    var calc = document.getElementById("calculate");
    var result = document.getElementById("result-text");
    var equation = document.getElementById("equation-text");

    calc.addEventListener("click", function() {
      var deposited = parseFloat(document.getElementById("deposited-input").value);
      var interest = parseFloat(document.getElementById("interest-input").value) / 100;
      var compound = document.getElementById("compound-input").value;
      var time = parseFloat(document.getElementById("time-input").value);
      var resultInterest = 0;
      var resultEquation = "";
      
      // stop script from calculating not-numbers
      if (isNaN(deposited) || isNaN(interest) || isNaN(time)) {
          result.innerHTML = "Please enter valid numbers";
          return;
      }

      if (compound === "continuous") {
        resultInterest = deposited * Math.exp(interest * time);
        resultEquation = `${deposited}e^(${interest}*${time})`;
      } else if (compound === "daily") {
        resultInterest = deposited * Math.pow((1 + interest / 365), (365 * time));
        resultEquation = `${deposited}(1 + ${interest}/365)^(365*${time})`;
      } else if (compound === "monthly") {
        resultInterest = deposited * Math.pow((1 + interest / 12), (12 * time));
        resultEquation = `${deposited}(1 + ${interest}/12)^(12*${time})`;
      } else if (compound === "yearly") {
        resultInterest = deposited * Math.pow((1 + interest), time);
        resultEquation = `${deposited}(1 + ${interest})^${time}`;
      }

      // toFixed(2) makes it look like currency (100.50)
      result.innerHTML = "$" + resultInterest.toFixed(2);

      equation.innerHTML = resultEquation;
    });
  </script>
</body>
</html>
