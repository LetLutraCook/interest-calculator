<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interest Calculator</title>
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  
  <style>
    /* Reset & Base Styles */
    * { box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: #333;
    }

    .calculator-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px; /* Widened slightly for equations */
    }

    h2 {
      margin-top: 0;
      font-size: 1.5rem;
      color: #2c3e50;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .field-wrapper {
      display: flex;
      align-items: center;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: 0 10px;
      transition: border-color 0.2s;
    }

    .field-wrapper:focus-within {
      border-color: #3498db;
    }

    input, select {
      border: none;
      outline: none;
      padding: 10px;
      width: 100%;
      font-size: 1rem;
      background: transparent;
    }

    button {
      width: 100%;
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 10px;
    }

    button:hover {
      background-color: #2980b9;
    }

    .results-container {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .result-row {
      margin-bottom: 15px;
      font-size: 1rem;
    }

    #result-text {
      color: #27ae60;
      font-weight: bold;
      font-size: 1.2rem;
    }

    /* Styling for the math container */
    #equation-text {
      display: block;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 4px;
      margin-top: 8px;
      min-height: 50px;
      overflow-x: auto; /* Scroll if equation is too long */
    }
  </style>
</head>
<body>

<div class="calculator-card">
  <h2>Interest Calculator</h2>

  <div class="input-group">
    <label for="deposited-input">Principal Amount</label>
    <div class="field-wrapper">
      <span>$</span>
      <input type="number" placeholder="2500" id="deposited-input">
    </div>
  </div>

  <div class="input-group">
    <label for="interest-input">Annual Interest Rate</label>
    <div class="field-wrapper">
      <input type="number" step="0.01" placeholder="2.75" id="interest-input">
      <span>%</span>
    </div>
  </div>

  <div class="input-group">
    <label for="compound-input">Compounding Period</label>
    <div class="field-wrapper" style="padding: 0;">
      <select id="compound-input">
        <option value="continuous">Continuously</option>
        <option value="daily">Daily</option>
        <option value="monthly">Monthly</option>
        <option value="yearly">Yearly</option>
      </select>
    </div>
  </div>

  <div class="input-group">
    <label for="time-input">Time (Years)</label>
    <div class="field-wrapper">
      <input type="number" placeholder="4" id="time-input">
    </div>
  </div>

  <button id="calculate">Calculate Return</button>

  <div class="results-container">
    <div class="result-row">
      <strong>Total Value:</strong> <span id="result-text">--</span>
    </div>
    <div class="result-row">
      <strong>Equation:</strong> 
      <div id="equation-text">$$A = P \cdot e^{rt}$$</div>
    </div>
  </div>
</div>

<script>
  const calc = document.getElementById("calculate");
  const result = document.getElementById("result-text");
  const equation = document.getElementById("equation-text");

  calc.addEventListener("click", function() {
    const deposited = parseFloat(document.getElementById("deposited-input").value);
    const r = parseFloat(document.getElementById("interest-input").value) / 100;
    const compound = document.getElementById("compound-input").value;
    const t = parseFloat(document.getElementById("time-input").value);
    
    let resultInterest = 0;
    let latexEquation = "";
    
    if (isNaN(deposited) || isNaN(r) || isNaN(t)) {
        result.innerHTML = "Error";
        equation.innerHTML = "Please enter valid numbers.";
        return;
    }

    if (compound === "continuous") {
      resultInterest = deposited * Math.exp(r * t);
      // LaTeX for e^(rt)
      latexEquation = `$$${deposited} \\cdot e^{${r} \\cdot ${t}}$$`;
    } else if (compound === "daily") {
      const n = 365;
      resultInterest = deposited * Math.pow((1 + r / n), (n * t));
      // LaTeX for fractions and exponents
      latexEquation = `$$${deposited} \\left(1 + \\frac{${r}}{${n}}\\right)^{${n} \\cdot ${t}}$$`;
    } else if (compound === "monthly") {
      const n = 12;
      resultInterest = deposited * Math.pow((1 + r / n), (n * t));
      latexEquation = `$$${deposited} \\left(1 + \\frac{${r}}{${n}}\\right)^{${n} \\cdot ${t}}$$`;
    } else if (compound === "yearly") {
      resultInterest = deposited * Math.pow((1 + r), t);
      latexEquation = `$$${deposited} (1 + ${r})^{${t}}$$`;
    }

    // Update the result value
    result.innerHTML = "$" + resultInterest.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    
    // Update the equation text with LaTeX string
    equation.innerHTML = latexEquation;

    // Tell MathJax to re-render the new LaTeX content
    MathJax.typeset();
  });
</script>

</body>
</html>
